name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact: gitstation-win-x64
          - os: ubuntu-latest
            runtime: linux-x64
            artifact: gitstation-linux-x64
          - os: macos-latest
            runtime: osx-arm64
            artifact: gitstation-osx-arm64
          - os: macos-13
            runtime: osx-x64
            artifact: gitstation-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/GitStation.csproj -c Release -r ${{ matrix.runtime }} -o publish /p:DisableAOT=true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
